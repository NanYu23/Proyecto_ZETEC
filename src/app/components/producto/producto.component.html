<!-- producto.component.html -->
<article class="card">
  <img class="img" [src]="product.imageUrl" [alt]="product.name" />

  <div class="body">
    <div class="top">
      <h3 class="title">{{ product.name }}</h3>
      <span class="price"> $ {{ product.price }}</span>
    </div>

    <p class="meta">{{ product.category }}</p>
    <p class="desc">{{ product.description }}</p>

    <p class="stock" [class.out]="product.inStock === 0">
      @if (product.inStock > 0) {
        En stock: {{ product.inStock }}
      } @else {
        Agotado
      }
    </p>

    <!-- Solo mostrar acciones si el producto esta en stock -->
    @if (product.inStock > 0) {
      <div class="product-actions">
        <div class="quantity">
          <button (click)="decrease()">-</button>
          <span>{{ quantity }}</span>
          <button (click)="increase()">+</button>
        </div>
        <button class="cart-btn" (click)="addToCart()">🛒</button>
      </div>
    }
  </div>
</article>
