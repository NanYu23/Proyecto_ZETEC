<!-- perfil_usuario.component.html -->

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <div class="navbar__brand">
    <div class="navbar__logo">
      <img
        src="logo_papeleria.jpeg"
        alt="Logo Papelería Zetec"
        class="navbar__logo-img"
      />
    </div>

    <span class="navbar__title">
      Papelería Zetec
    </span>
  </div>

  <div class="navbar__links">
    <a
      routerLink="/catalogo"
      routerLinkActive="active"
      class="navbar__link"
    >
      Catálogo
    </a>

    <a
      routerLink="/inicio"
      routerLinkActive="active"
      class="navbar__link"
    >
      Inicio
    </a>
  </div>

  <div class="navbar__actions">

    <!-- HISTORIAL -->
    <button
      class="navbar__icon-btn"
      title="Historial"
      routerLink="/historial-pedidos"
    >
      <svg
        viewBox="0 0 24 24"
        width="22"
        height="22"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
    </button>

    <!-- CARRITO -->
    <button
      class="navbar__icon-btn"
      title="Carrito"
      routerLink="/carrito"
    >
      <svg
        viewBox="0 0 24 24"
        width="22"
        height="22"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <circle cx="9" cy="21" r="1" />
        <circle cx="20" cy="21" r="1" />
        <path
          d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
        />
      </svg>

      <span class="cart-count">
        {{ carritoService.obtenerCantidad() }}
      </span>
    </button>

    <!-- PERFIL -->
    <button
      class="navbar__icon-btn"
      title="Mi cuenta"
      routerLink="/perfil_usuario"
    >
      <svg
        viewBox="0 0 24 24"
        width="22"
        height="22"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
    </button>

  </div>
</nav>

<!-- ===== CONTENIDO ===== -->
<div class="perfil-container">

  <!-- BOTON CERRAR SESION -->
  <div class="perfil-top">
    <button
      class="btn-cerrar"
      (click)="cerrarSesion()"
    >
      Cerrar sesión
    </button>
  </div>

  <!-- TITULO -->
  <h1 class="perfil-title">
    Perfil
  </h1>

  <!-- FORMULARIO -->
  <div class="perfil-card">

    <!-- USUARIO -->
    <div class="perfil-row">

      <div class="perfil-icon">
        <svg
          viewBox="0 0 24 24"
          width="30"
          height="30"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>

      <label class="perfil-label">
        Usuario:
      </label>

      <input
        type="text"
        class="perfil-input"
        [(ngModel)]="nombreUsuario"
      />

    </div>

    <!-- CORREO -->
    <div class="perfil-row">

      <div class="perfil-icon">
        <svg
          viewBox="0 0 24 24"
          width="30"
          height="30"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <path d="M4 4h16v16H4z"/>
          <path d="M4 6l8 7 8-7"/>
        </svg>
      </div>

      <label class="perfil-label">
        Correo:
      </label>

      <input
        type="email"
        class="perfil-input"
        [(ngModel)]="correoUsuario"
      />

    </div>

    <!-- BOTONES -->
    <div class="perfil-buttons">

      <button
        class="btn-guardar"
        (click)="guardarCambios()"
      >
        Guardar Cambios
      </button>

      <button
        class="btn-cancelar"
        (click)="cancelar()"
      >
        Cancelar
      </button>

    </div>

  </div>

</div>
