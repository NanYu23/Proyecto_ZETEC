<!-- home.html -->

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <div class="navbar__brand">
    <div class="navbar__logo">
      <img src="logo_papeleria.jpeg" alt="Logo Papelería Zetec" class="navbar__logo-img" />
    </div>
    <span class="navbar__title">Papelería Zetec</span>
  </div>

  <div class="navbar__links">
    <a routerLink="/catalogo" routerLinkActive="active" class="navbar__link">Catálogo</a>
    <a routerLink="/inicio"   routerLinkActive="active" class="navbar__link">Inicio</a>
  </div>

  <div class="navbar__actions">
    <button class="navbar__icon-btn" title="Historial">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </button>
    <button class="navbar__icon-btn" title="Carrito">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9"  cy="21" r="1"/>
        <circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
    </button>
    <button class="navbar__icon-btn" title="Mi cuenta">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
  </div>
</nav>

<!-- ===== CARRUSEL ===== -->
<section class="carousel">
  <div class="carousel__track" [style.transform]="'translateX(-' + (currentSlide * 100) + '%)'">
    @for(slide of slides; track slide.id){
      <div class="carousel__slide">
        <img [src]="slide.image" [alt]="slide.alt" class="carousel__img" />
      </div>
    }
  </div>

  <button class="carousel__arrow carousel__arrow--prev" (click)="prevSlide()">&#8249;</button>
  <button class="carousel__arrow carousel__arrow--next" (click)="nextSlide()">&#8250;</button>

  <div class="carousel__dots">
    @for(slide of slides; track slide.id; let i = $index){
      <span class="carousel__dot"
            [class.carousel__dot--active]="i === currentSlide"
            (click)="goToSlide(i)">
      </span>
    }
  </div>
</section>

<!-- ===== PRODUCTOS DESTACADOS ===== -->
<!-- ✅ products() con paréntesis porque ahora es un signal -->
<section class="featured">
  <div class="featured__grid">
    @for(p of products(); track p.id){
      <app-product-card [product]="p"></app-product-card>
    }
  </div>

  <div class="featured__more">
    <button routerLink="/catalogo" class="btn-primary">
      VER MÁS PRODUCTOS
    </button>
  </div>
</section>
