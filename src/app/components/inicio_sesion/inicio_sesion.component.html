<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <div class="navbar__brand">
    <div class="navbar__logo">
      <img src="logo_papeleria.jpeg" alt="Logo Papelería Zetec" class="navbar__logo-img" />
    </div>
    <span class="navbar__title">Papelería Zetec</span>
  </div>

  <div class="navbar__links">
    <a routerLink="/inicio" routerLinkActive="active" class="navbar__link">Inicio</a>
    <a routerLink="/catalogo" routerLinkActive="active" class="navbar__link">Catálogo</a>
  </div>

  <div class="navbar__actions">
    <button class="navbar__icon-btn" title="Historial" routerLink="/historial-pedidos">
      <svg
        viewBox="0 0 24 24"
        width="22"
        height="22"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
    </button>

    <button class="navbar__icon-btn" title="Carrito" routerLink="/carrito">
      <svg
        viewBox="0 0 24 24"
        width="22"
        height="22"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <circle cx="9" cy="21" r="1" />
        <circle cx="20" cy="21" r="1" />
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
      </svg>

      <span class="cart-count">
        {{ carritoService.obtenerCantidad() }}
      </span>
    </button>

    <button class="navbar__icon-btn" title="Mi cuenta" routerLink="/inicio_sesion">
      <svg
        viewBox="0 0 24 24"
        width="22"
        height="22"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
    </button>
    
  </div>
</nav>

<!-- ===== CONTENEDOR ===== -->
<div class="registro-wrapper">
  <!-- ===== TARJETA ===== -->
  <div class="card-registro">
    <!-- ===== CONTENIDO ===== -->
    <div class="contenido">
      <h2>Inicia sesión</h2>

      <p class="login-texto">
        No tienes una cuenta con nosotros?
        <a routerLink="/crear_usuario"> Regístrate </a>
      </p>

      <!-- ===== FORM ===== -->
      <form (ngSubmit)="iniciarSesion()">
        <div class="grupo-input">
          <label>EMAIL</label>

          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Ingresa tu correo electrónico"
          />
        </div>

        <div class="grupo-input">
          <label>CONTRASEÑA</label>

          <!-- recuerden encubrir la contraseña por *** para que no se vea -->
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Ingresa tu contraseña"
          />
        </div>

        <div class="forgot-password">
          <a routerLink="/recuperar-password">¿OLVIDASTE TU CONTRASEÑA?</a>
        </div>

        <button class="btn-registro" type="submit">INICIAR SESIÓN</button>
      </form>
    </div>
  </div>
</div>
