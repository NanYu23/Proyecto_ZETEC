<!-- catalogo.component.html -->

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <div class="navbar__brand">
    <div class="navbar__logo">
      <img src="logo_papeleria.jpeg" alt="Logo Papelería Zetec" class="navbar__logo-img" />
    </div>
    <span class="navbar__title">Papelería Zetec</span>
  </div>

  <div class="navbar__links">
    <a routerLink="/catalogo" routerLinkActive="active" class="navbar__link">Catálogo</a>
    <a routerLink="/inicio"   routerLinkActive="active" class="navbar__link">Inicio</a>
  </div>

  <div class="navbar__actions">
    <button class="navbar__icon-btn" title="Historial">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </button>
    <button class="navbar__icon-btn" title="Carrito">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9"  cy="21" r="1"/>
        <circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
    </button>
    <button class="navbar__icon-btn" title="Mi cuenta">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
  </div>
</nav>

<!-- ===== ENCABEZADO + FILTRO ===== -->
<div class="catalog-header">
  <h1 class="catalog-header__title", style="color: #1a6dbf;">Catálogo de productos</h1>

  <div class="catalog-header__filter">
    <svg class="filter-icon" viewBox="0 0 24 24" width="20" height="20"
         fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
    </svg>

    <select class="filter-select"
            [(ngModel)]="selectedCategory"
            (change)="onCategoryChange()">
      <option value="">Selecciona una categoría...</option>
      <!-- ✅ categories() con paréntesis porque es signal -->
      @for(cat of categories(); track cat){
        <option [value]="cat">{{ cat }}</option>
      }
    </select>
  </div>
</div>

<!-- ===== GRID DE PRODUCTOS ===== -->
<!-- ✅ filteredProducts() con paréntesis porque es signal -->
<section class="catalog-grid">
  @for(p of filteredProducts(); track p.id){
    <app-product-card [product]="p"></app-product-card>

  }

  @if(filteredProducts().length === 0){
    <p class="catalog-empty">No hay productos en esta categoría.</p>
  }
</section>
